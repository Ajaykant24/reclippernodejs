services:
  - type: web
    name: reclipper-backend
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: STORAGE_DIR
        value: /var/data
      - key: CORS_ORIGINS
        value: https://clippar-black.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
    disk:
      name: reclipper-data
      mountPath: /var/data
      sizeGB: 5
