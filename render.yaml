services:
  - type: web
    name: reclipper-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: STORAGE_DIR
        value: /var/data
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: reclipper-data
      mountPath: /var/data
      sizeGB: 10
    healthCheckPath: /health
