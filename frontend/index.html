<!-- 
  MAIN HTML WRAPPER FILE: index.html
  - Purpose: This is the entry point page loaded by the web browser. 
  - How it works: It provides a blank layout with a container (<div id="root">), then loads React (main.jsx) which injects the interactive interface.
  - Editing Tip: You can change the <title> tag text to rename your website tab.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- RESPONSIVENESS: Ensures the page scales beautifully on mobile phones and tablets.
         Pinch-zoom stays enabled (accessibility); inputs use >=16px font to prevent iOS auto-zoom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA: installable "Add to Home Screen" app that opens fullscreen like a native app. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f4efe8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Reclipper" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- FONTS: Inter + Material Symbols are self-hosted (bundled by Vite) — no Google Fonts requests. -->

    <!-- BROWSER TAB TITLE: The name that appears at the top of your web browser's tab. -->
    <title>Reclipper</title>
  </head>
  <body>
    <!-- 
      INJECTION PORT: The entire React application is mounted inside this blank "root" box.
      - Never delete this element, or the screen will go blank.
    -->
    <div id="root"></div>
    
    <!-- JAVASCRIPT LOADER: Tells the browser to run main.jsx, which builds the React app inside the root div. -->
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
